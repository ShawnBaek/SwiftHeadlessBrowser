name: CI

on:
  push:
    branches: [master, main, feature/*]
  pull_request:
    branches: [master, main]

jobs:
  build-macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-latest
    strategy:
      matrix:
        swift: ["6.2"]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Run tests
        run: swift test 2>&1 | tee test-output.txt
      - name: Test summary
        if: always()
        run: |
          echo "## macOS Test Results" >> $GITHUB_STEP_SUMMARY
          grep "Test run with" test-output.txt | tail -1 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          grep -E 'ANTHROPIC:|UBER:' test-output.txt >> $GITHUB_STEP_SUMMARY || true

  build-linux:
    name: Linux (Swift latest)
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Run tests
        run: swift test 2>&1 | tee test-output.txt
      - name: Test summary
        if: always()
        run: |
          echo "## Linux Test Results" >> $GITHUB_STEP_SUMMARY
          grep "Test run with" test-output.txt | tail -1 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          grep -E 'ANTHROPIC:|UBER:' test-output.txt >> $GITHUB_STEP_SUMMARY || true

  ci-success:
    name: CI Success
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-macos.result }}" != "success" ]] || \
             [[ "${{ needs.build-linux.result }}" != "success" ]]; then
            exit 1
          fi
          echo "All CI jobs passed!"
