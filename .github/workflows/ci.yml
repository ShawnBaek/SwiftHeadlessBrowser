name: CI

on:
  push:
    branches: [master, main, feature/*]
  pull_request:
    branches: [master, main]

jobs:
  # macOS Build and Test
  build-macos:
    name: macOS (Swift ${{ matrix.swift }})
    runs-on: macos-latest
    strategy:
      matrix:
        swift: ["6.2"]
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Run tests
        id: test
        run: |
          SKIP_BROWSER_TESTS=1 swift test --parallel 2>&1 | tee test-output.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## macOS Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Test run with" test-output.txt; then
            TEST_LINE=$(grep "Test run with" test-output.txt | tail -1)
            TESTS=$(echo "$TEST_LINE" | grep -oE '[0-9]+ tests' | grep -oE '[0-9]+' || echo "0")
            SUITES=$(echo "$TEST_LINE" | grep -oE '[0-9]+ suites' | grep -oE '[0-9]+' || echo "0")
            TIME=$(echo "$TEST_LINE" | grep -oE '[0-9.]+ seconds' | grep -oE '[0-9.]+' || echo "0")
            if echo "$TEST_LINE" | grep -q "passed"; then
              echo "All tests passed ($TESTS tests, $SUITES suites, ${TIME}s)" >> $GITHUB_STEP_SUMMARY
            else
              echo "Some tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: test-output.txt

  # Linux Build and Test
  build-linux:
    name: Linux (Swift latest)
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Run tests
        id: test
        run: |
          SKIP_BROWSER_TESTS=1 swift test --parallel 2>&1 | tee test-output.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## Linux Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Test run with" test-output.txt; then
            TEST_LINE=$(grep "Test run with" test-output.txt | tail -1)
            TESTS=$(echo "$TEST_LINE" | grep -oE '[0-9]+ tests' | grep -oE '[0-9]+' || echo "0")
            SUITES=$(echo "$TEST_LINE" | grep -oE '[0-9]+ suites' | grep -oE '[0-9]+' || echo "0")
            TIME=$(echo "$TEST_LINE" | grep -oE '[0-9.]+ seconds' | grep -oE '[0-9.]+' || echo "0")
            if echo "$TEST_LINE" | grep -q "passed"; then
              echo "All tests passed ($TESTS tests, $SUITES suites, ${TIME}s)" >> $GITHUB_STEP_SUMMARY
            else
              echo "Some tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: test-output.txt

  # CI Success Gate
  ci-success:
    name: CI Success
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-macos.result }}" != "success" ]] || \
             [[ "${{ needs.build-linux.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"
